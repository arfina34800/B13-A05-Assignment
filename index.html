<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Issues Tracker</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-200 flex items-center justify-center h-screen">

<div class="bg-white w-[420px] p-8 rounded-xl shadow">

  <!-- Logo -->
  <div class="flex justify-center mb-4">
    <img src="assets/github-logo.png"
    class="w-16">
  </div>

  <!-- Title -->
  <h1 class="text-center text-2xl font-bold">
    GitHub Issues Tracker
  </h1>

  <p class="text-center text-gray-500 mb-6">
    Sign in to manage your issues
  </p>

  <!-- Username -->
  <label class="text-sm font-medium">Username</label>

  <input type="text"
  placeholder="Enter Username"
  class="w-full border rounded-md p-2 mt-1 mb-2">

  <p class="text-sm text-blue-600 mb-4">
    Default: admin
  </p>

  <!-- Password -->
  <label class="text-sm font-medium">Password</label>

  <input type="password"
  placeholder="Enter Password"
  class="w-full border rounded-md p-2 mt-1 mb-2">

  <p class="text-sm text-blue-600 mb-4">
    Default: admin123
  </p>

  <!-- Button -->
  <button id="loginBtn"
  class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-2 rounded-md">
    Sign In
  </button>

  <!-- OR -->
  <div class="flex items-center my-6">
    <hr class="flex-grow border-gray-300">
    <span class="mx-2 text-gray-400">OR</span>
    <hr class="flex-grow border-gray-300">
  </div>

  <!-- Demo -->
  <p class="text-center text-gray-500 text-sm mb-2">
    Demo Credentials:
  </p>

  <div class="bg-gray-100 p-4 rounded text-center text-sm">
    <p><b>Username:</b> admin</p>
    <p><b>Password:</b> admin123</p>
  </div>

</div>
 <script src="./login.js"></script>

</body>
</html>
