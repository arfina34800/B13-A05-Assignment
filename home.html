<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B13-A05 Assignment</title>
<!-- font awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind + daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-gray-100">

<header>
  <div class="bg-white shadow p-4 flex justify-between items-center">

<div class="flex items-center gap-2 font-semibold text-2xl">
  <img class="h-8 w-8" src="assets/github-logo.png">
 GitHub Issues Tracker
</div>

<div class="flex gap-2">
<input id="searchInput"
type="text"
placeholder="Search issues..." 
class="border px-4 py-2 rounded text-sm"
>

<button
class="bg-blue-600 text-white px-4 py-2 rounded text-sm">
+ New Issue
</button>

</div>

</div>
</header>

<div class="mt-4 flex  gap-3 px-4 bg-white p-4 rounded-lg shadow w-10/12 mx-auto">

<button id="allBtn" onclick="filterIssues('all')"
class="px-4 py-1 bg-blue-600 text-white rounded">
All
</button>

<button id="openBtn" onclick="filterIssues('open')"
class="px-4 py-1 border rounded">
Open
</button>

<button id="closedBtn"  onclick="filterIssues('closed')"
class="px-4 py-1 border rounded">
Closed
</button>

</div>

<div class="mt-4 bg-white p-4 rounded-lg shadow flex items-center justify-between w-10/12 mx-auto">
  <div class="flex items-center gap-3">
    
    <div class="bg-purple-100 p-2 rounded-lg">
      <img src="assets/Aperture.png" class="w-8 h-8" alt="icon">
    </div>

    <div>
      <p id="issueCount" class="font-bold text-gray-800">50 Issues</p>
      <p class="text-sm text-gray-500">Track and manage your project issues</p>
    </div>

  </div>
  <div class="flex items-center gap-6 text-sm">

    <div class="flex items-center gap-1">
      <span class="w-2 h-2 bg-green-500 rounded-full"></span>
      <span class="text-gray-800">Open</span>
    </div>

    <div class="flex items-center gap-1">
      <span class="w-2 h-2 bg-purple-500 rounded-full"></span>
      <span class="text-gray-800">Closed</span>
    </div>

  </div>

</div>

<section id="word-container" class="bg-gray-100 w-10/12 mx-auto"></section>

<script></script>

   
</body>
</html>
